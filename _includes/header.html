<header role="banner">
  <div class="container mx-auto my-6">
    <nav class="flex space-x-6">
      <a rel="author" href="{{ "/" | relative_url }}" class="text-gray-600 hover:text-sky-400">
        Home
      </a>
      {% for page in site.data.pages %}
        <a href="{{ page.path | relative_url }}" class="text-gray-600 hover:text-sky-400">
          {{ page.title | escape }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
