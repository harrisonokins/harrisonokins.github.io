<header role="banner">
  <div class="container mx-auto my-6 absolute z-10 right-0 left-0">
    <nav class="flex space-x-6">
      <a rel="author" href="{{ "/" | relative_url }}" class="text-gray-600 hover:text-sky-400{% if page.url == '/' %} font-bold{% endif %}">
        Home
      </a>
      {% for node in site.data.pages %}
        <a href="{{ node.url | relative_url }}" class="text-gray-600 hover:text-sky-400{% if page.url == node.url %} font-bold{% endif %}">
          {{ node.title | escape }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
