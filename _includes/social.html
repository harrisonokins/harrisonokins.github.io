<ul>
  {% for network in site.data.social_networks %}
    <li>
      <a href="{{ network.link }}" title="{{ network.name }}" target="_blank">
        <svg>
          <use xlink:href="{{ network.icon | relative_url }}"></use>
        </svg>
        <span>{{ network.value }}</span>
      </a>
    </li>
  {% endfor %}

  {%- if site.rss -%}
  <li>
    <a href="{{ 'feed.xml' | relative_url }}" title="RSS">
      <svg>
        <use xlink:href="{{ '/assets/social-icons.svg#rss' | relative_url }}"></use>
      </svg>
      <span>{{ site.rss | escape }}</span>
    </a>
  </li>
  {%- endif -%}
</ul>
